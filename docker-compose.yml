services:
  atlas-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: someday-atlas-web
    ports:
      # Reserve the 8030-8039 block for Someday Atlas in the homelab.
      - "8030:8000"
    volumes:
      - atlas_data:/data
    restart: unless-stopped
    networks:
      - atlas_net

volumes:
  atlas_data:

networks:
  atlas_net:
    name: someday-atlas-network
    driver: bridge