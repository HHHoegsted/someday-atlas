{% extends "base.html" %}

{% block content %}
<section class="map-shell map-shell-expanded">
    <div id="journey-map" data-map-payload='{{ map_payload|tojson }}'></div>
    <aside class="map-sidebar">
        <h2>What shows up here</h2>
        <p>Each stop becomes a pin. Stops from the same journey are connected in story order, even if the route doubles back.</p>
        <p>If a stop has a timestamp, its popup links back to the exact moment in the video.</p>
    </aside>
</section>
{% endblock %}
