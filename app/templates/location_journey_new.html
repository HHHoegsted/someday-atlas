{% extends "base.html" %}

{% block content %}
<section class="form-shell">
    <div class="section-header narrow compact compact-form-header">
        <div>
            <h2>Create journey</h2>
        </div>
    </div>
    <form class="stack-form" method="post" action="/location-journeys">
        <label>
            <span>Journey name</span>
            <input type="text" name="name" value="{{ prefill_name }}" placeholder="Tokyo station-to-garden day" required>
        </label>
        <label>
            <span>First saved place</span>
            <select name="first_location_id" required>
                <option value="" disabled {% if not selected_location %}selected{% endif %}>Select a saved location</option>
                {% for location in selectable_locations %}
                <option value="{{ location.id }}" {% if selected_location and selected_location.id == location.id %}selected{% endif %}>{{ location.name }}{% if location.country %} · {{ location.country }}{% elif location.region %} · {{ location.region }}{% endif %}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            <span>Description</span>
            <textarea name="description" rows="3" placeholder="Optional route context">{{ prefill_description }}</textarea>
        </label>
        <div class="edit-actions-row">
            <button class="button" type="submit">Create journey</button>
            <a class="button secondary" href="/location-journeys">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
